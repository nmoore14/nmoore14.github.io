<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Nick Moore | Designer</title>

        <!-- CSS Links -->
        <link rel="stylesheet" href="./css/index.css">

        <!-- Font Links -->
        <link href="https://fonts.googleapis.com/css?family=Julius+Sans+One|Maitree" rel="stylesheet">

        <!-- JavaScript Links -->
        <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
        <script src="https://code.jquery.com/jquery-3.3.1.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
            crossorigin="anonymous"></script>
    </head>
    <body>
        <nav id="nav-wrapper">
            <div id="nav-left">
                <a href="index.html">
                    <h4 class="nameHeader">Nick Moore</h4>
                    <h5 class="taglineHeader">Graphic Designer & <br />Web Developer</h5>
                </a>
            </div>
            <div id="nav-middle">
                <div id="brand">
                    <img src="./images/IMG_0024.jpg" alt="CAD drawing of Nick Moore" id="nick-img-1">
                </div>
            </div>
            <div id="nav-right">
                <h4>Right</h4>
            </div>
        </nav>
        <div id="main">
            <div id="content-wrapper">
                <div id="content-left">
                    <h3 id="pro-header">Professional</h3>
                    <h5 class="contentSubHeader">Projects that I would consider to be business or company related.</h5>
                    <div id="professional-inProgress">
                        <h5>In Progress</h5>
                        <ul v-for="project in pro" id="pro-bottom-list">
                            <li>
                                <a v-bind:href="project.location">{{ project.name }}</a><br />
                                <small class="sourceTextLink"><a v-bind:href="project.source">Source Code</a></small>
                            </li>
                        </ul>
                    </div>
                </div>
                <div id="content-right">
                    <h3 id="fun-header">For FUN</h3>
                    <h5 class="contentSubHeader">Projects that I have created for fun and learning.</h5>
                    <div id="fun-completed">
                        <h5>Completed</h5>
                        <ul v-for="project in fun" id="fun-top-list">
                            <li>
                                <a v-bind:href="project.location">{{ project.name }}</a><br />
                                <small class="sourceTextLink"><a v-bind:href="project.source">Source Code</a></small>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div id="info-wrapper">
                <h3>Hi</h3>
            </div>
        </div>  
        
        <!-- At the bottom to help with page load times -->
        <script src="./js/index.js"></script>
    </body>
</html>
